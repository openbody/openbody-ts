version: 2
updates:
  # npm dependencies (ajv/ajv-formats/canonicalize + the dev toolchain).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch the low-risk dev toolchain into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used by the conformance workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
