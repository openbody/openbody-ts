name: conformance

# Runs this reference implementation against the standard's conformance vectors,
# which live in the separate openbody/openbody repo (schema + conformance/vectors).
# Both repos are checked out side by side and OPENBODY_STANDARD points at the standard.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20.19 is the package's engines floor (import attributes).
        node-version: ["20.19", "22", "24"]
    steps:
      - name: Checkout openbody-ts
        uses: actions/checkout@v7
        with:
          path: openbody-ts

      - name: Checkout openbody (the standard — schema + vectors)
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody
          path: openbody
          # While the standard repo is PRIVATE the default GITHUB_TOKEN cannot read it;
          # set a STANDARD_REPO_TOKEN secret (fine-grained PAT / App token with read
          # access to openbody/openbody). Once the repo is public the fallback works.
          token: ${{ secrets.STANDARD_REPO_TOKEN || github.token }}
          ref: main

      - name: Checkout openbody-registry (exercise-name crosswalk data)
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody-registry
          path: openbody-registry
          token: ${{ secrets.STANDARD_REPO_TOKEN || github.token }}
          ref: main

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: openbody-ts/package-lock.json

      - name: Install
        working-directory: openbody-ts
        run: npm ci --no-audit --no-fund

      # npm test already runs `npm run lint` on every leg (biome is ~30ms); this explicit
      # step exists so lint/format failures surface under their own name — once, not 3×.
      - name: Lint + format check (biome — one matrix leg only)
        if: matrix.node-version == '22'
        working-directory: openbody-ts
        run: npx biome ci .

      - name: Vendor data snapshots (schema + crosswalk — gitignored, sibling-sourced)
        working-directory: openbody-ts
        env:
          OPENBODY_STANDARD: ${{ github.workspace }}/openbody
          OPENBODY_REGISTRY: ${{ github.workspace }}/openbody-registry
        run: |
          npm run sync-schema
          npm run sync-crosswalk

      - name: Test (typecheck + biome check + vitest — lossless/vectors/resolver/mappers/validate)
        working-directory: openbody-ts
        env:
          OPENBODY_STANDARD: ${{ github.workspace }}/openbody
          OPENBODY_REGISTRY: ${{ github.workspace }}/openbody-registry
        run: npm test

      - name: Pack sanity (files list + publishability)
        working-directory: openbody-ts
        run: npm pack --dry-run
