name: release

# One-click release. This org can't let Actions open PRs (enterprise policy), so instead of
# the Changesets "Version Packages" PR, this consumes the pending changesets and commits the
# version bump + CHANGELOG straight to main. Trigger it from the Actions tab → release →
# "Run workflow" when you want to cut a release. Runs ONLY on manual dispatch — never on push,
# so it makes no noise until you ask for it.
on:
  workflow_dispatch:

permissions:
  contents: write # commit the version bump to main

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0" # don't fire the local pre-commit hook on the CI commit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Version (consume changesets → bump + CHANGELOG) and commit to main
        run: |
          npx changeset version
          if git diff --quiet && git diff --cached --quiet; then
            echo "No pending changesets — nothing to release."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): version packages"
          git push
      # PUBLISH IS INTENTIONALLY DISABLED until this package goes public on npm. To enable:
      # add an NPM_TOKEN secret + the sibling-repo checkouts prepack needs (mirror
      # conformance.yml's sync-schema/sync-crosswalk), then a step running `npm run release`
      # with `NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}`.
