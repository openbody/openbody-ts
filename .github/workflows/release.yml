name: release

# Maintains a single "Version Packages" PR: when changesets land on main, this opens/updates
# one PR that bumps the version + regenerates CHANGELOG.md and deletes the consumed changesets.
# Merging that PR is how a release is cut — with no pending changesets, the changesets action
# runs `publish` instead and ships any version not already on npm (a no-op if nothing is ahead).
#
# Publishing uses npm Trusted Publishing (OIDC): no long-lived NPM_TOKEN. The job presents a
# GitHub OIDC identity (id-token: write) that npm exchanges for a short-lived credential, and
# npm attaches a signed provenance attestation automatically. One-time setup on npmjs.com:
# @openbody/openbody-ts -> Settings -> Trusted Publisher -> GitHub Actions, pointing at this
# repo + workflow (release.yml). `prepack` (sync-schema && sync-crosswalk && build) rebuilds the
# bundled `vendor/` data from the sibling repos, so — like conformance.yml — we check them out
# and point OPENBODY_STANDARD / OPENBODY_REGISTRY at them, else the tarball ships without data.
on:
  push:
    branches: [main]

# One release run at a time; a newer push supersedes an in-flight one.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # push the version-bump branch
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC — mint a short-lived npm credential via Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0" # the changesets action makes a git commit — don't fire local hooks in CI
    steps:
      - name: Checkout openbody-ts
        uses: actions/checkout@v7
        with:
          path: openbody-ts
          fetch-depth: 0 # changesets needs full history + tags

      - name: Checkout openbody (the standard — schema + vectors)
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody
          path: openbody
          token: ${{ secrets.STANDARD_REPO_TOKEN || github.token }}
          ref: main

      - name: Checkout openbody-registry (exercise-name crosswalk data)
        uses: actions/checkout@v7
        with:
          repository: openbody/openbody-registry
          path: openbody-registry
          token: ${{ secrets.STANDARD_REPO_TOKEN || github.token }}
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openbody-ts/package-lock.json

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        working-directory: openbody-ts
        run: npm ci --no-audit --no-fund

      - name: Open the Version Packages PR, or publish a merged release
        uses: changesets/action@v1
        with:
          cwd: openbody-ts
          version: npm run version-packages
          publish: npm run release # `changeset publish` — skips versions already on npm; OIDC auth
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth is via OIDC (id-token: write above + npm Trusted Publisher config).
          # prepack regenerates vendor/ from the siblings checked out above.
          OPENBODY_STANDARD: ${{ github.workspace }}/openbody
          OPENBODY_REGISTRY: ${{ github.workspace }}/openbody-registry
