name: release

# Maintains a single "Version Packages" PR: when changesets land on main, this opens/updates
# one PR that bumps the version + regenerates CHANGELOG.md and deletes the consumed changesets.
# Merging that PR is how a release is cut. It never touches main directly and does NOT publish,
# so nothing unexpected ships. On a push with no pending changesets it's a no-op.
on:
  push:
    branches: [main]

# One release run at a time; a newer push supersedes an in-flight one.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # push the version-bump branch
  pull-requests: write # open/update the Version Packages PR

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0" # the changesets action makes a git commit — don't fire local hooks in CI
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Open or update the Version Packages PR
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          # PUBLISH IS INTENTIONALLY DISABLED until this package goes public on npm.
          # To turn it on: add an `NPM_TOKEN` repo secret + the sibling-repo checkouts prepack
          # needs (mirror conformance.yml), then add `publish: npm run release` here and export
          # `NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}` below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
